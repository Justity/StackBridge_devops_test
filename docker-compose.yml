services:
  backend:
    build: ./backend
    container_name: em-backend
    restart: unless-stopped
    networks:
      - app-network
    # No `ports:` on purpose — the backend must not be reachable from the host.
    # `expose` is documentation only; the port is available inside the network anyway.
    expose:
      - "8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: em-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # The only port published to the host
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
