# Mounted as /etc/nginx/conf.d/default.conf — replaces the stock default config

upstream backend {
    # Docker Compose service name, resolved by the embedded DNS of the docker network
    server backend:8080;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://backend;

        # Pass the standard proxy headers to the backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
